apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: statuspage-external-secret
  namespace: eso # Change this to the target namespace where your application runs
spec:
  # How often ESO re-syncs from Vault to check for token/secret rotations
  refreshInterval: 1m
  
  # Reference to your cluster-wide Vault backend store
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
    
  # The configuration of the native Kubernetes Secret that ESO will output
  target:
    name: statuspage-config-secret
    creationPolicy: Owner
    
  # Mappings from individual Vault properties to your final Kubernetes Secret keys
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: statuspage/config # The subpath inside your KV v2 engine
        property: db_password   # The exact key string inside the Vault secret
        
    - secretKey: API_KEY
      remoteRef:
        key: statuspage/config
        property: api_key